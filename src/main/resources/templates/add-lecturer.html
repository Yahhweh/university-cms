<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Add Lecturer</title>
</head>
<body class="py-5">
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Add Lecturer</h1>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/add-lecturer}" method="post">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" placeholder="John" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Sure Name</label>
                    <input type="text" name="sureName" placeholder="Smith" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <select name="gender" required class="form-select">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="dateOfBirth" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="address.city" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Street</label>
                    <input type="text" name="address.street" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="address.phoneNumber" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Country</label>
                    <input type="text" name="address.country" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">House Number</label>
                    <input type="text" name="address.houseNumber" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Postal Code</label>
                    <input type="text" name="address.postalCode" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Salary</label>
                    <input type="number" name="salary" min="0" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Subjects</label>
                    <select name="studySubjectIds" multiple class="form-select" style="height: 120px;">
                        <option th:each="subject : ${subjects}" th:value="${subject.id}" th:text="${subject.name}"></option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Add Lecturer</button>
                    <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin Panel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
