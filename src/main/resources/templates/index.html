<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{styles/css.html :: my-css}">
    <title>Vilnius Tech</title>
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand text-uppercase fw-bold"
          style="letter-spacing: 2px;">University</span>
    <div class="d-flex gap-2 align-items-center">
        <div sec:authorize="hasAnyRole('STUDENT')">
            <a th:href="@{/students/profile}"
               class="btn btn-outline-light btn-sm">Profile</a>
        </div>
        <div sec:authorize="hasAnyRole('LECTURER')">
            <a th:href="@{/lecturers/profile}"
               class="btn btn-outline-light btn-sm">Profile</a>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin}"
               class="btn btn-outline-light btn-sm">Admin</a>
        </div>
        <div sec:authorize="hasRole('STAFF')">
            <a th:href="@{/staff}"
               class="btn btn-outline-light btn-sm">Staff</a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<section style="position: relative; height: 400px; overflow: hidden;">
    <img th:src="@{/images/university-section.jpeg}" class="w-100 h-100"
         style="object-fit: cover;" alt="Hero">
    <div class="shadow"
         style="position: absolute; bottom: 20%; right: 10%; background: lightcyan; padding: 25px; max-width: 400px; border-radius: 4px;">
        <h3>University cms</h3>
        <p class="small">University Content Management System for Vilnius
            Tech</p>
    </div>
</section>

<nav class="navbar navbar-dark bg-primary px-3"
     sec:authorize="hasRole('ADMIN')">
    <div class="d-flex gap-2 flex-wrap justify-content-center w-100">
        <a th:href="@{/students}"
           class="btn btn-outline-light btn-sm">Students</a>
        <a th:href="@{/lecturers}" class="btn btn-outline-light btn-sm">Lecturers</a>
        <a th:href="@{/lessons}"
           class="btn btn-outline-light btn-sm">Lessons</a>
        <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle"
                    data-bs-toggle="dropdown" aria-expanded="false">
                Other
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item"
                       th:href="@{/durations}">Duration</a></li>
                <li><a class="dropdown-item" th:href="@{/groups}">Group</a></li>
                <li><a class="dropdown-item" th:href="@{/rooms}">Room</a></li>
                <li><a class="dropdown-item" th:href="@{/room-types}">Room
                    Type</a></li>
                <li><a class="dropdown-item" th:href="@{/subjects}">Subject</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
