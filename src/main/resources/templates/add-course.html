<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{styles/css.html :: my-css}">
    <meta charset="UTF-8">
    <title>Add Course</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div th:if="${errorMessage}"
     th:insert="~{toasts/error-toast :: error-toast(${errorMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0">Add Course</h1>
        </div>
        <div class="card-body">
            <form method="post" th:action="@{/admin/add-course}">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" placeholder="Applied Mathematics" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Subjects</label>
                    <select name="subjectIds" multiple class="form-select" size="6">
                        <option th:each="subject : ${subjects}"
                                th:value="${subject.id}"
                                th:text="${subject.name}">Math</option>
                    </select>
                    <small class="text-muted"></small>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Add Course</button>
                    <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin Panel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
