<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{styles/css.html :: my-css}">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"></div>
<div class="d-flex gap-2 p-3 justify-content-between">
    <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/admin/durations}" class="btn btn-outline-light btn-sm">Duration</a>
        <a th:href="@{/subjects}" class="btn btn-outline-light btn-sm">Subject</a>
        <a th:href="@{/rooms}"
           class="btn btn-outline-light btn-sm">Room</a>
    </div>
    <a th:href="@{/lessons/create-lesson}" class="btn btn-success btn-sm">Create
        Lesson</a>
</div>

<div th:replace="~{lessons :: lessons}">

</div>
</body>
</html>
