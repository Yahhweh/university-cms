<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:insert="~{styles/css.html :: my-css}">
    <title>Profile</title>
</head>
<body class="py-5">

<div class="card shadow mx-auto" style="max-width: 900px;">
    <div class="card-header bg-primary text-white text-center py-4">
        <h1 class="h2 mb-1" th:text="${group.name}">Group name</h1>
    </div>

    <div class="card-body p-4">

        <div class="d-flex align-items-center mb-0">
            <h6 class="bg-primary text-white text-uppercase fw-bold px-3 py-2 rounded-top mb-0 flex-grow-1"
                style="letter-spacing: 1px;">Group Information</h6>
            <span sec:authorize="hasRole('MENTOR')">
                <button type="button" class="btn btn-link p-1 text-primary"
                        onclick="toggleInfoEdit()" title="Edit group info">
                    <i class="bi bi-pencil fs-5"></i>
                </button>
            </span>
        </div>
        <table class="table table-bordered table-striped mb-4">
            <tr>
                <th class="table-primary w-25">Information</th>
                <td>
                    <span id="infoText" th:text="${group.info}">info</span>
                    <form id="infoForm"
                          th:action="@{/group-profile/update-info}"
                          method="post" style="display:none;">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="groupId"
                               th:value="${group.id}"/>
                        <textarea name="info" class="form-control mb-2"
                                  th:text="${group.info}"></textarea>
                        <button type="submit" class="btn btn-primary btn-sm">
                            Save
                        </button>
                        <button type="button" class="btn btn-secondary btn-sm"
                                onclick="toggleInfoEdit()">Cancel
                        </button>
                    </form>
                </td>
            </tr>
            <tr>
                <th class="table-primary">Course</th>
                <td th:text="${group.course.getName()}">It-fu</td>
            </tr>
            <tr>
                <th class="table-primary">Mentor</th>
                <td th:text="${group.mentor.getName() + ' ' + group.getMentor().getSureName()}">
                    John Doe
                </td>
            </tr>
            <tr>
                <th class="table-primary">Mentor contact information</th>
                <td th:text="${group.getMentor().getEmail()}">email</td>
            </tr>
            <tr>
                <th class="table-primary">Number of Students</th>
                <td th:text="${students.size()}">11</td>
            </tr>

        </table>
        <a th:href="@{/}" class="btn btn-primary mt-2">Back to Main page</a>
        <form th:action="@{{groupId}/students(groupId=${group.id})}">
            <button type="submit" class="btn btn-primary btn-sm">
                Group Detail
            </button>
        </form>
    </div>
</div>

<script>
    function toggleInfoEdit() {
        const text = document.getElementById('infoText');
        const form = document.getElementById('infoForm');
        text.style.display = text.style.display === 'none' ? '' : 'none';
        form.style.display = form.style.display === 'none' ? '' : 'none';
    }
</script>

</body>
</html>
