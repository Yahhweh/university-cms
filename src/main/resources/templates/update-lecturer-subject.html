<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Assign Subject</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Assign Subjects to <span
                th:text="${lecturer.fullName}"></span></h1>
        </div>
        <div class="card-body">
            <form th:action="@{/users/update-lecturer-subjects}" method="post">
                <input type="hidden" name="lecturerId"
                       th:value="${lecturer.id}"/>
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <label class="form-label">Subjects</label>
                <div th:each="subject : ${subjects}">
                    <input type="checkbox" name="subjectIds"
                           th:value="${subject.id}"
                           th:checked="${lecturer.subjectIds.contains(subject.id)}"/>
                    <span th:text="${subject.name}">Math</span>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/users}" class="btn btn-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
