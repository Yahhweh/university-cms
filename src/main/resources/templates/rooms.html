<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{styles/css.html :: my-css}">
    <meta charset="UTF-8">
    <title>Room List</title>
</head>
<body class="py-4">
<form th:action="@{/rooms}" method="get" class="row g-2 mb-4">
    <div class="col-auto">
        <input type="text" name="roomType" placeholder="Hall"
               th:value="${filters.roomType}" class="form-control">
    </div>
    <div class="col-auto">
        <input type="text" name="number" placeholder="AB-121"
               th:value="${filters.number}" class="form-control">
    </div>
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-primary">Filter</button>
    </div>
    <div class="col-auto">
        <a th:href="@{/rooms}" class="btn btn-outline-light">Reset</a>
    </div>
</form>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="text-white mb-0">Rooms</h2>
        <a th:href="@{/rooms/create-room}" class="btn btn-success">Add Room</a>
    </div>
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover bg-white">
            <thead class="table-dark">
            <tr>
                <th>
                    <a class="text-white"
                       th:href="@{/{path}(path = ${url}, page=${page.number}, size=${page.size}, sort='room,' + (${page.sort.getOrderFor('room')?.ascending} ? 'desc' : 'asc'))}">
                        Room Number
                    </a>
                </th>
                <th>
                    <a class="text-white"
                       th:href="@{/{path}(path = ${url}, page=${page.number}, size=${page.size}, sort='roomType.name,' + (${page.sort.getOrderFor('roomType.name')?.ascending} ? 'desc' : 'asc'))}">
                        Room Type
                    </a>
                </th>
                <th>
                    <a class="text-white">Actions</a>
                </th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="room : ${rooms}">
                <td th:text="${room.room}">B-102</td>
                <td th:text="${room.roomType?.name ?: '-'}">LECTURE_HALL</td>
                <td class="d-flex gap-2">
                    <form th:action="@{/rooms/delete-room}" method="post">
                        <input type="hidden" name="roomId"
                               th:value="${room.id}"/>
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <div
                            th:replace="~{hidden-inputs/room-hidden-inputs :: inputs}"></div>
                        <button type="submit"
                                class="btn btn-link p-0 text-danger"
                                title="Delete room">
                            <i class="bi bi-trash fs-5"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:insert="~{page :: pageNavigation}"></div>
</div>
</body>
</html>
