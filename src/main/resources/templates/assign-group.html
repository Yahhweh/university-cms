<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Assign Group</title>
</head>
<body class="py-5">
<div th:if="${successMessage}" th:insert="~{toasts/success-toast :: success-toast(${successMessage})}" class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Assign Group to Course</h1>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/assign-group}" method="post">
                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select name="courseId" required class="form-select">
                        <option value="" disabled selected>Select course</option>
                        <option th:each="course : ${courses}"
                                th:value="${course.id}"
                                th:text="${course.name}"></option>
                    </select>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Groups</label>
                    <select name="groupIds" multiple class="form-select" size="8">
                        <option value="" disabled>Select groups</option>
                        <option th:each="group : ${groups}"
                                th:value="${group.id}"
                                th:text="${group.name}"></option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Assign</button>
                    <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin Panel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
