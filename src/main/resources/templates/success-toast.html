<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:fragment="success-toast(message)" class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="successToast" class="toast show" role="alert" data-bs-autohide="false">
        <div class="toast-header bg-success text-white">
            <strong class="me-auto">Success</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" th:text="${message}"></div>
    </div>
</div>
</body>
</html>
