<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Assign Group</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Assign Group to Course</h1>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/update-course-group}" method="get">
                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select name="courseId" required class="form-select">
                        <option value="" disabled selected>Select course</option>
                        <option th:each="course : ${courses}"
                                th:value="${course.id}"
                                th:text="${course.name}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Select</button>
            </form>

            <div th:if="${selectedCourse}">
                <form th:action="@{/admin/update-course-group}" method="post">
                    <input type="hidden" name="courseId"
                           th:value="${selectedCourse.id}"/>
                    <input type="hidden" th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <label class="form-label">Groups</label>
                    <div th:each="group : ${groups}">
                        <input name="groupIds" type="checkbox"
                               th:value="${group.id}"
                               th:checked="${courseGroups.contains(group.id)}">
                        <span th:text="${group.name}">AA-1</span>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">Assign</button>
                        <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin Panel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
