<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body class="py-5">
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white text-center">
            <h1 class="h3 mb-0">Admin Panel</h1>
        </div>
        <div class="card-body text-center py-4">
            <div class="d-flex gap-3 justify-content-center flex-wrap">
                <a th:href="@{/admin/add-user}" class="btn btn-primary">Add User</a>
                <a th:href="@{admin/users}" class="btn btn-primary"> List Users</a>
                <a th:href="@{/users/assign-subject}" class="btn btn-primary">Assign Subject</a>
                <a th:href="@{/users/remove-subject}" class="btn btn-primary">Remove Subject</a>
                <a th:href="@{/lessons/lesson-setup}" class="btn btn-primary">Lesson Setup</a>
                <a th:href="@{/admin/courses}" class="btn btn-primary">Courses</a>
                <a th:href="@{/admin/add-course}" class="btn btn-primary">Add Course</a>
                <a th:href="@{/admin/assign-group}" class="btn btn-primary">Assign Group</a>
                <a th:href="@{/admin/remove-group}" class="btn btn-primary">Remove Group</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
