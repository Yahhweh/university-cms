<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{styles/css.html :: my-css}"></head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="card shadow text-center mx-auto" style="max-width: 500px; width: 100%;">
    <div class="card-header bg-warning text-dark py-4">
        <div class="display-1 fw-bold" th:text="{error}">404</div>
        <p class="mb-0 fs-5" th:text="${title}">User Not Found</p>
    </div>
    <div class="card-body py-4">
        <p class="text-muted mb-4" th:text="${message}">Some Error</p>
        <a href="/" class="btn btn-warning">Go to Home</a>
    </div>
</div>
</body>
</html>
