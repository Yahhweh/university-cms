<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Staff Panel</title>
</head>
<body class="py-5">
<div class="container">
    <div class="card shadow mx-auto mb-4" style="max-width: 700px;">
        <div class="card-header bg-primary text-white text-center">
            <h1 class="h3 mb-0">Staff Panel</h1>
        </div>
        <div class="card-body text-center py-4">
            <div class="d-flex gap-3 justify-content-center flex-wrap">
                <a th:href="@{/users/list}" class="btn btn-primary">List Users</a>
                <a th:href="@{/lessons/lesson-setup}" class="btn btn-primary">Lesson Setup</a>
                <a th:href="@{/users/assign-subject}" class="btn btn-primary">Assign Subject</a>
                <a th:href="@{/users/remove-subject}" class="btn btn-primary">Remove Subject</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
