<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Add Room</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div th:if="${errorMessage}"
     th:insert="~{toasts/error-toast :: error-toast(${errorMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Add Room</h1>
        </div>
        <div class="card-body">
            <form method="post" th:action="@{/admin/add-room}">
                <div class="mb-3">
                    <label class="form-label">Room Number</label>
                    <input type="text" name="room" placeholder="A-101" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Room Type</label>
                    <select name="classRoomTypeId" required class="form-select">
                        <option value="" disabled selected>Select room type</option>
                        <option th:each="roomType : ${roomTypes}"
                                th:value="${roomType.id}"
                                th:text="${roomType.name}"></option>
                    </select>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Add Room</button>
                    <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin Panel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
