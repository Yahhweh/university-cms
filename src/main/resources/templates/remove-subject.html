<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Remove Subject</title>
</head>
<body class="py-5">
<div th:if="${successMessage}" th:insert="~{toasts/success-toast :: success-toast(${successMessage})}" class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Remove Subject from Lecturer</h1>
        </div>
        <div class="card-body">

            <div th:unless="${selectedLecturer}">
                <form th:action="@{/admin/remove-subject}" method="get">
                    <div class="mb-3">
                        <label class="form-label">Lecturer</label>
                        <select name="lecturerId" required class="form-select">
                            <option value="" disabled selected>Select lecturer</option>
                            <option th:each="lecturer : ${lecturers}"
                                    th:value="${lecturer.id}"
                                    th:text="${lecturer.name + ' ' + lecturer.sureName}"></option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">

                        <button type="submit" class="btn btn-primary">Select</button>
                        <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin Panel</a>
                    </div>
                </form>
            </div>

            <div th:if="${selectedLecturer}">
                <p class="mb-3">
                    Lecturer: <strong th:text="${selectedLecturer.name + ' ' + selectedLecturer.sureName}"></strong>
                </p>
                <form th:action="@{/admin/remove-subject}" method="post">
                    <input type="hidden" name="lecturerId" th:value="${selectedLecturer.id}"/>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select name="subjectsId" multiple class="form-select">
                            <option value="" disabled selected>Select subject</option>
                            <option th:each="s : ${subjects}"
                                    th:value="${s.id}"
                                    th:text="${s.name}"></option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Remove</button>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <a th:href="@{/admin/remove-subject}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
</body>
</html>
