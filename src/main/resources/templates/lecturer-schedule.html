<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{styles/css.html :: my-css}">
    <title>My Schedule</title>
</head>
<body>
<style>
    .schedule-container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        overflow: hidden;
    }

    .schedule-header {
        background-color: #2089f1;
        color: white;
        padding: 30px;
        text-align: center;
    }

    .schedule-content {
        padding: 30px;
    }

    .week-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        background: #f0f7ff;
        padding: 12px 20px;
        border-radius: 8px;
    }

    .week-nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        padding: 8px 18px;
        background-color: #2089f1;
        border-radius: 5px;
        transition: background 0.2s;
    }

    .week-nav a:hover {
        background-color: #1a6dc9;
    }

    .week-nav span {
        font-weight: bold;
        color: #333;
    }

    .day-section {
        margin-bottom: 25px;
    }

    .day-title {
        background-color: #1e3a8a;
        color: white;
        padding: 10px 15px;
        border-radius: 5px 5px 0 0;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>

<div class="schedule-container">
    <div class="schedule-header">
        <h1>My Schedule</h1>
        <p class="role">Lecturer Schedule</p>
    </div>

    <div class="schedule-content">
        <div class="week-nav">
            <a th:href="@{/my-schedule/lecturer(weekStart=${prevWeek})}">&#8592; Previous Week</a>
            <span th:text="${#temporals.format(weekStart, 'dd MMM', T(java.util.Locale).ENGLISH)} + ' – ' + ${#temporals.format(weekEnd, 'dd MMM yyyy', T(java.util.Locale).ENGLISH)}">01 Jan – 07 Jan 2024</span>
            <a th:href="@{/my-schedule/lecturer(weekStart=${nextWeek})}">Next Week &#8594;</a>
        </div>

        <div th:each="entry : ${lessonsByDay}" class="day-section">
            <div class="day-title" th:text="${#temporals.format(entry.key, 'EEEE, dd MMM', T(java.util.Locale).ENGLISH)}">Monday, 01 Jan</div>

            <table th:if="${!entry.value.isEmpty()}">
                <thead>
                <tr>
                    <th>Time</th>
                    <th>Subject</th>
                    <th>Group</th>
                    <th>Room</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="lesson : ${entry.value}">
                    <td th:text="${lesson.duration}">08:00-09:30</td>
                    <td th:text="${lesson.subject.name}">Mathematics</td>
                    <td th:text="${lesson.group.name}">Group A</td>
                    <td th:text="${lesson.room}">A-101</td>
                </tr>
                </tbody>
            </table>
            <p th:if="${entry.value.isEmpty()}" class="empty-state" style="padding: 10px 15px; background: #f9f9f9;">No lessons</p>
        </div>

        <a th:href="@{/}" class="back-button">Back to Main page</a>
    </div>
</div>

</body>
</html>
