<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head th:insert="~{styles/css.html :: my-css}">
    <title>Please Log In</title>
</head>
<body style="display: flex; align-items: center; justify-content: center;">
<div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 10px;">
    <h1 class="h3 mb-4">Please Log In</h1>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid username and password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <input type="text" name="username" placeholder="Email" required class="form-control form-control-lg"/>
        </div>
        <div class="mb-3">
            <input type="password" name="password" placeholder="Password" required class="form-control form-control-lg"/>
        </div>
        <div class="form-check mb-3">
            <input type="checkbox" id="rememberMe" name="rememberMe" class="form-check-input">
            <label for="rememberMe" class="form-check-label">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">Log In</button>
    </form>
</div>
</body>
</html>
