<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Add Lesson</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div th:if="${errorMessage}"
     th:insert="~{toasts/error-toast :: error-toast(${errorMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Add Lesson</h1>
        </div>
        <div class="card-body">
            <form method="post" th:action="@{/admin/add-lesson}">
                <div class="mb-3">
                    <label class="form-label">Duration</label>
                    <select name="durationId" required class="form-select">
                        <option value="" disabled selected>Select duration</option>
                        <option th:each="duration : ${durations}"
                                th:value="${duration.id}"
                                th:text="${duration.start} + ' - ' + ${duration.end}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <select name="studySubjectId" required class="form-select"
                            onchange="window.location.href='/admin/add-lesson?subjectId=' + this.value">
                        <option value="" disabled th:selected="${subjectId == null}">Select subject</option>
                        <option th:each="subject : ${subjects}"
                                th:value="${subject.id}"
                                th:text="${subject.name}"
                                th:selected="${subject.id == subjectId}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Group</label>
                    <select name="groupId" required class="form-select">
                        <option value="" disabled selected>Select group</option>
                        <option th:each="group : ${groups}"
                                th:value="${group.id}"
                                th:text="${group.name}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Lecturer</label>
                    <select name="lecturerId" required class="form-select">
                        <option value="" disabled selected>Select lecturer</option>
                        <option th:each="lecturer : ${lecturers}"
                                th:value="${lecturer.id}"
                                th:text="${lecturer.name} + ' ' + ${lecturer.sureName}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Room</label>
                    <select name="classRoomId" required class="form-select">
                        <option value="" disabled selected>Select room</option>
                        <option th:each="room : ${rooms}"
                                th:value="${room.id}"
                                th:text="${room.room}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" required class="form-control">
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Add Lesson</button>
                    <a th:href="@{/admin}" class="btn btn-secondary">Back to Admin Panel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
