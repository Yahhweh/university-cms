<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Change Roles</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Change Roles for <span th:text="${user.name + ' ' + user.sureName}"></span></h1>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/change-role}" method="post">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label class="form-label">Roles</label>
                <div th:each="role : ${allRoles}">
                    <input type="checkbox" name="newRole"
                           th:value="${role.name()}"
                           th:checked="${user.roles.contains(role)}"/>
                    <span th:text="${role.name()}"></span>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
