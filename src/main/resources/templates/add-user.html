<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Add User</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0" id="formTitle">Add User</h1>
        </div>
        <div class="card-body">
            <form id="addUserForm" method="post">
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="roleSelect" class="form-select"
                            onchange="updateForm(this.value)">
                        <option value="STAFF">Staff</option>
                        <option value="STUDENT">Student</option>
                        <option value="LECTURER">Lecturer</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" placeholder="John" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Sure Name</label>
                    <input type="text" name="sureName" placeholder="Smith"
                           required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" name="email" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <select name="gender" required class="form-select">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="dateOfBirth" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="address.city" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Street</label>
                    <input type="text" name="address.street" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="address.phoneNumber" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Country</label>
                    <input type="text" name="address.country" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">House Number</label>
                    <input type="text" name="address.houseNumber" required
                           class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Postal Code</label>
                    <input type="text" name="address.postalCode" required
                           class="form-control">
                </div>

                <div id="student-fields" style="display:none;">
                    <div class="mb-3">
                        <label class="form-label">Degree</label>
                        <select name="degree" class="form-select">
                            <option value="Bachelor">Bachelor</option>
                            <option value="Master">Master</option>
                            <option value="Doctoral">Doctoral</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Group (optional)</label>
                        <select name="groupId" class="form-select">
                            <option value="">-- No Group --</option>
                            <option th:each="group : ${groups}"
                                    th:value="${group.id}"
                                    th:text="${group.name}"></option>
                        </select>
                    </div>
                </div>

                <div id="lecturer-fields" style="display:none;">
                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" name="salary" min="0"
                               class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subjects</label>
                        <select name="studySubjectIds" multiple
                                class="form-select" style="height: 120px;">
                            <option th:each="subject : ${subjects}"
                                    th:value="${subject.id}"
                                    th:text="${subject.name}"></option>
                        </select>
                    </div>
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <div class="d-flex gap-2">
                    <button type="submit" id="submitBtn"
                            class="btn btn-primary">Add User
                    </button>
                    <a th:href="@{/admin}" class="btn btn-secondary">Back to
                        Admin Panel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:inline="javascript">
    function updateForm(role) {
        const studentFields = document.getElementById('student-fields');
        const lecturerFields = document.getElementById('lecturer-fields');
        const form = document.getElementById('addUserForm');
        const submitBtn = document.getElementById('submitBtn');
        const formTitle = document.getElementById('formTitle');

        studentFields.style.display = 'none';
        lecturerFields.style.display = 'none';
        studentFields.querySelectorAll('[data-role-required]').forEach(el => el.removeAttribute('required'));
        lecturerFields.querySelectorAll('[data-role-required]').forEach(el => el.removeAttribute('required'));

        if (role === 'STUDENT') {
            studentFields.style.display = 'block';
            studentFields.querySelector('[name="degree"]').setAttribute('required', '');
            form.action = /*[[@{/admin/add-student}]]*/ '/admin/add-student';
            submitBtn.textContent = 'Add Student';
            formTitle.textContent = 'Add Student';
        } else if (role === 'LECTURER') {
            lecturerFields.style.display = 'block';
            lecturerFields.querySelector('[name="salary"]').setAttribute('required', '');
            form.action = /*[[@{/admin/add-lecturer}]]*/ '/admin/add-lecturer';
            submitBtn.textContent = 'Add Lecturer';
            formTitle.textContent = 'Add Lecturer';
        } else {
            form.action = /*[[@{/admin/add-user}]]*/ '/admin/add-user';
            submitBtn.textContent = 'Add User';
            formTitle.textContent = 'Add User';
        }
    }

    updateForm(document.getElementById('roleSelect').value);
</script>
</body>
</html>
