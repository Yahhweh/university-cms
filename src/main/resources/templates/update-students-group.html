<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Assign Group</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0">Assign Group to <span
                th:text="${student.fullName}"></span></h1>
        </div>
        <div class="card-body">
            <form th:action="@{/students/update-student-group}" method="post">
                <input type="hidden" name="studentId"
                       th:value="${student.id}"/>
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <label class="form-label">Group</label>
                <div class="list-group mb-3">
                    <label th:each="group : ${groups}"
                           class="list-group-item list-group-item-action d-flex align-items-center gap-2">
                        <input type="radio" name="groupId"
                               th:value="${group.id}"
                               th:checked="${student.groupIds == group.id}"
                               class="form-check-input mt-0"/>
                        <span th:text="${group.name}"></span>
                    </label>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/groups}" class="btn btn-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
