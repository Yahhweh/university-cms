<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="styles/css.html :: my-css">
    <meta charset="UTF-8">
    <title>Create Subject</title>
</head>
<body class="py-5">
<div th:if="${successMessage}"
     th:insert="~{toasts/success-toast :: success-toast(${successMessage})}"
     class="py-4"></div>
<div th:if="${errorMessage}"
     th:insert="~{toasts/error-toast :: error-toast(${errorMessage})}"
     class="py-4"></div>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0" id="formTitle">Add Subject</h1>
            <a th:href="@{create-subject}" class="btn btn-success btn-sm">create Subject</a>
        </div>
        <div class="card-body">
            <form id="addSubjectForm" method="post">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" placeholder="Math" required
                           class="form-control">
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <div class="d-flex gap-2">
                    <button type="submit" id="submitBtn"
                            class="btn btn-primary">Create Subject
                    </button>
                    <a th:href="@{/admin}" class="btn btn-secondary">Back to
                        Admin Panel</a>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
