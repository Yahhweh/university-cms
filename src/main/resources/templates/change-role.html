<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{styles/css.html :: my-css}">
    <meta charset="UTF-8">
    <title>Change User Role</title>
</head>
<body>
<h1>Change User Role</h1>

<form th:action="@{/admin/change-role}" method="get">
    <input type="text" name="name" placeholder="First name" th:value="${filterName}">
    <input type="text" name="sureName" placeholder="Last name" th:value="${filterSureName}">
    <input type="text" name="email" placeholder="Email" th:value="${filterEmail}">
    <select name="role">
        <option value="">All roles</option>
        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                th:selected="${r == filterRole}"></option>
    </select>
    <button type="submit">Filter</button>
    <a th:href="@{/admin/change-role}">Reset</a>
</form>

<table>
    <thead>
        <tr>
            <th>
                <a th:href="@{/{path}(path=${url}, page=${page.number}, size=${page.size}, sort='id,' + (${page.sort.getOrderFor('id')?.ascending} ? 'desc' : 'asc'))}">
                    ID
                </a>
            </th>
            <th>
                <a th:href="@{/{path}(path=${url}, page=${page.number}, size=${page.size}, sort='name,' + (${page.sort.getOrderFor('name')?.ascending} ? 'desc' : 'asc'))}">
                    First Name
                </a>
            </th>
            <th>
                <a th:href="@{/{path}(path=${url}, page=${page.number}, size=${page.size}, sort='sureName,' + (${page.sort.getOrderFor('sureName')?.ascending} ? 'desc' : 'asc'))}">
                    Last Name
                </a>
            </th>
            <th>
                <a th:href="@{/{path}(path=${url}, page=${page.number}, size=${page.size}, sort='email,' + (${page.sort.getOrderFor('email')?.ascending} ? 'desc' : 'asc'))}">
                    Email
                </a>
            </th>
            <th>
                <a th:href="@{/{path}(path=${url}, page=${page.number}, size=${page.size}, sort='role,' + (${page.sort.getOrderFor('role')?.ascending} ? 'desc' : 'asc'))}">
                    Role
                </a>
            </th>
            <th>Change Role</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="person : ${persons}">
            <td th:text="${person.id}"></td>
            <td th:text="${person.name}"></td>
            <td th:text="${person.sureName}"></td>
            <td th:text="${person.email}"></td>
            <td th:text="${person.role}"></td>
            <td>
                <form th:action="@{/admin/change-role}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="id" th:value="${person.id}">
                    <select name="role">
                        <option value="ADMIN">ADMIN</option>
                        <option value="STUDENT">STUDENT</option>
                        <option value="LECTURER">LECTURER</option>
                        <option value="STUFF">STUFF</option>
                    </select>
                    <button type="submit">Change</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>

<div th:insert="~{page :: pageNavigation}"></div>
</body>
</html>
