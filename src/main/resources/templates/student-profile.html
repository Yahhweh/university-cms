<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{styles/css.html :: my-css}">
    <title>Profile</title>
</head>
<body class="py-5">

<div class="card shadow mx-auto" style="max-width: 900px;">
    <div class="card-header bg-primary text-white text-center py-4">
        <h1 class="h2 mb-1" th:text="${student.name + ' ' + student.sureName}">John Doe</h1>
        <p class="mb-0 opacity-75">Student Profile</p>
    </div>

    <div class="card-body p-4">

        <h6 class="bg-primary text-white text-uppercase fw-bold px-3 py-2 rounded-top mb-0" style="letter-spacing: 1px;">Personal Information</h6>
        <table class="table table-bordered table-striped mb-4">
            <tr>
                <th class="table-primary w-25">Name</th>
                <td th:text="${student.name}">John</td>
            </tr>
            <tr>
                <th class="table-primary">Surname</th>
                <td th:text="${student.sureName}">Doe</td>
            </tr>
            <tr>
                <th class="table-primary">Email</th>
                <td th:text="${student.email}">john.doe@university.com</td>
            </tr>
            <tr>
                <th class="table-primary">Gender</th>
                <td th:text="${student.gender}">MALE</td>
            </tr>
            <tr>
                <th class="table-primary">Date of Birth</th>
                <td th:text="${#temporals.format(student.dateOfBirth, 'yyyy-MM-dd')}">2007-01-01</td>
            </tr>
            <tr>
                <th class="table-primary">Degree</th>
                <td th:text="${student.degree}">MASTER</td>
            </tr>
            <tr>
                <th class="table-primary">Group</th>
                <td th:text="${student.degree != null ? student.group: 'N/A'}">AB-12</td>
            </tr>
        </table>

        <h6 class="bg-primary text-white text-uppercase fw-bold px-3 py-2 rounded-top mb-0" style="letter-spacing: 1px;">Address</h6>
        <table class="table table-bordered table-striped mb-4" th:if="${student.address != null}">
            <tr>
                <th class="table-primary w-25">Street</th>
                <td th:text="${student.address.street}">Main Street</td>
            </tr>
            <tr>
                <th class="table-primary">House Number</th>
                <td th:text="${student.address.houseNumber}">123</td>
            </tr>
            <tr>
                <th class="table-primary">City</th>
                <td th:text="${student.address.city}">Vilnius</td>
            </tr>
            <tr>
                <th class="table-primary">Country</th>
                <td th:text="${student.address.country}">Lithuania</td>
            </tr>
        </table>
        <p th:if="${student.address == null}" class="text-muted fst-italic px-2 py-2 bg-light">No address information available</p>

        <a th:href="@{/}" class="btn btn-primary mt-2">Back to Main page</a>
    </div>
</div>

</body>
</html>
