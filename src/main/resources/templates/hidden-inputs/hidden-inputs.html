<div th:fragment="inputs">
    <input type="hidden" name="id" th:value="${user.id}">
    <input type="hidden" name="page" th:value="${page.number}">
    <input type="hidden" name="size" th:value="${page.size}">
    <th:block th:each="order : ${page.sort}">
        <input type="hidden" name="sort"
               th:value="${order.property + ',' + order.direction.name().toLowerCase()}">
    </th:block>
    <input type="hidden" name="name" th:value="${filters.name}">
    <input type="hidden" name="sureName" th:value="${filters.sureName}">
    <input type="hidden" name="email" th:value="${filters.email}">
    <input type="hidden" name="role" th:value="${filters.role}">
</div>
