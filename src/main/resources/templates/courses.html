<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{styles/css.html :: my-css}">
    <meta charset="UTF-8">
    <title>Courses List</title>
</head>
<body class="py-4">
<div th:if="${successMessage}"
     th:replace="~{toasts/success-toast :: success-toast(${successMessage})}"></div>
<div class="container">
    <form th:action="@{/{url}(url=${url})}" method="get" class="row g-2 mb-4">
        <div class="col-auto">
            <input name="name" type="text" placeholder="Course name"
                   th:value="${name}" class="form-control">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Filter</button>
        </div>
        <div class="col-auto">
            <a th:href="@{/{url}(url=${url})}" class="btn btn-outline-light">Reset</a>
        </div>
    </form>
    <h2 class="text-white mb-3">Courses</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover bg-white">
            <thead class="table-dark">
            <tr>
                <th>
                    <a class="text-white"
                       th:href="@{/{path}(path = ${url}, page=${page.number}, size=${page.size}, sort='name,' + (${page.sort.getOrderFor('name')?.ascending} ? 'desc' : 'asc'))}">
                        Name
                    </a>
                </th>
                <th>Subjects</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.name}">Applied Math</td>
                <td>
                    <span th:each="subject, iter : ${course.subjects}">
                        <span th:text="${subject.name}">Math</span><span th:if="${!iter.last}">, </span>
                    </span>
                </td>
                <td>
                    <form th:action="@{/admin/delete-course}" method="post">
                        <input type="hidden" name="courseId" th:value="${course.id}"/>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div th:replace="~{hidden-inputs/cours-hidden-inputs :: inputs}"></div>
                        <button type="submit" class="btn btn-link p-0 text-danger" title="Delete course">
                            <i class="bi bi-trash fs-5"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:insert="~{page :: pageNavigation}"></div>
</div>
</body>
</html>
